name: Refresh snapshots

# Daily: rebuild the shipped snapshot from live Wikidata. If the diff
# is non-empty AND live tests pass, open a PR for the maintainer to
# merge. This is the load-bearing piece that keeps the package's data
# fresh without anyone having to remember to run `make snapshots`.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Regenerate snapshots from Wikidata
        run: make snapshots
      - name: Detect change
        id: diff
        run: |
          if git diff --quiet src/special_days/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff src/special_days/data/ | head -200
          fi
      - name: Run live tests
        if: steps.diff.outputs.changed == 'true'
        run: SPECIAL_DAYS_LIVE_TESTS=1 python -m unittest discover -s tests -v
      - name: Annotate PR body
        if: steps.diff.outputs.changed == 'true'
        # Writes per-change Wikidata Q-ID + history + Google cross-check
        # links to /tmp/pr-body.md; peter-evans picks it up via body-path.
        run: python scripts/annotate_refresh.py > /tmp/pr-body.md
      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "Refresh snapshots from Wikidata"
          branch: bot/refresh-snapshots
          commit-message: "Refresh snapshots from Wikidata"
          body-path: /tmp/pr-body.md
          labels: |
            automated
            snapshot-refresh
      # Reaching here means `make snapshots` fetched Wikidata successfully
      # and (if the data changed) the live tests passed — i.e. the snapshot
      # is verified current as of today. Update the README's "last refreshed"
      # badge via a Gist (shields.io endpoint), so it advances every day even
      # when nothing changed, and goes stale if this job starts failing. This
      # step is intentionally NOT gated on `changed`.
      - name: Compute today's date
        id: date
        run: echo "today=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
      - name: Update "last refreshed" badge
        uses: schneegans/dynamic-badges-action@v1.9.0
        with:
          auth: ${{ secrets.GIST_BADGE_TOKEN }}
          gistID: 5964c94bc8e1e539a3c47b309ca64d9f
          filename: special-days-wikidata-refresh.json
          label: wikidata refreshed
          message: ${{ steps.date.outputs.today }}
          color: blue
