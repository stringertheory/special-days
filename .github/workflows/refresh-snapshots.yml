name: Refresh snapshots

# Daily: rebuild the shipped snapshot from live Wikidata. If the diff
# is non-empty AND live tests pass, open a PR for the maintainer to
# merge. This is the load-bearing piece that keeps the package's data
# fresh without anyone having to remember to run `make snapshots-live`.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Regenerate snapshots from Wikidata
        run: make snapshots-live
      - name: Detect change
        id: diff
        run: |
          if git diff --quiet src/special_days/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff src/special_days/data/ | head -200
          fi
      - name: Run live tests
        if: steps.diff.outputs.changed == 'true'
        run: SPECIAL_DAYS_LIVE_TESTS=1 python -m unittest discover -s tests -v
      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Refresh snapshots from Wikidata"
          branch: bot/refresh-snapshots
          commit-message: "Refresh snapshots from Wikidata"
          body: |
            Daily Wikidata snapshot refresh. Live tests passed.

            Eyeball the diff before merging — unexpected new entries
            could indicate Wikidata vandalism.
          labels: |
            automated
            snapshot-refresh
