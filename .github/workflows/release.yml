name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment carries the deployment protection rules
    # configured on this repo (Settings -> Environments -> pypi). It
    # also pairs with PyPI's trusted-publisher config, which expects
    # an environment name for tightest scoping.
    environment:
      name: pypi
      url: https://pypi.org/p/special-days
    # id-token: write is what enables the OIDC handshake with PyPI;
    # no API token is ever stored in repo secrets.
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
