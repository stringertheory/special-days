name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python matrix on Linux (cheap, fast).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
        os: [ubuntu-latest]
        include:
          # Add macOS + Windows on the oldest supported Python only --
          # enough to catch platform-specific filesystem / pathing
          # surprises without paying for a full M x N matrix.
          - python-version: "3.10"
            os: macos-latest
          - python-version: "3.10"
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # Only 3.15 is a prerelease right now; opt in just for that
          # entry so stable versions don't search the prerelease feed.
          allow-prereleases: ${{ matrix.python-version == '3.15' }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m unittest discover -s tests -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pre-commit run --all-files
